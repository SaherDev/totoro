<svg xmlns="http://www.w3.org/2000/svg" width="90" height="90" viewBox="0 0 90 90" fill="none">
            <!-- Stars scattered -->
            <circle cx="16" cy="18" r="2.5" fill="#F4C430" opacity="0.8"/>
            <circle cx="74" cy="14" r="2" fill="#F4C430" opacity="0.7"/>
            <circle cx="80" cy="36" r="1.5" fill="#F4C430" opacity="0.5"/>
            <circle cx="10" cy="40" r="1.5" fill="#F4C430" opacity="0.6"/>
            <circle cx="68" cy="52" r="2" fill="#F4C430" opacity="0.4"/>
            <!-- Body mid-jump -->
            <ellipse cx="45" cy="52" rx="22" ry="22" fill="#ADADAD"/>
            <ellipse cx="45" cy="56" rx="13" ry="13" fill="#D8D8D0"/>
            <!-- Ears excited -->
            <ellipse cx="30" cy="16" rx="5" ry="12" fill="#9A9A9A" transform="rotate(-15 30 16)"/>
            <ellipse cx="60" cy="16" rx="5" ry="12" fill="#9A9A9A" transform="rotate(15 60 16)"/>
            <ellipse cx="30" cy="17" rx="3" ry="7" fill="#C8A0A0" transform="rotate(-15 30 17)" opacity="0.6"/>
            <ellipse cx="60" cy="17" rx="3" ry="7" fill="#C8A0A0" transform="rotate(15 60 17)" opacity="0.6"/>
            <!-- Face eyes squeezed shut -->
            <ellipse cx="45" cy="38" rx="14" ry="13" fill="#ADADAD"/>
            <path d="M 36 34 Q 39 30 42 34" stroke="#1A1A2E" stroke-width="2.5" fill="none" stroke-linecap="round"/>
            <path d="M 48 34 Q 51 30 54 34" stroke="#1A1A2E" stroke-width="2.5" fill="none" stroke-linecap="round"/>
            <!-- Wide open smile -->
            <path d="M 38 42 Q 45 48 52 42" stroke="#1A1A2E" stroke-width="2" fill="none" stroke-linecap="round"/>
            <!-- Arms wide -->
            <path d="M 28 48 Q 14 40 8 34" stroke="#9A9A9A" stroke-width="5" stroke-linecap="round" fill="none"/>
            <path d="M 62 48 Q 76 40 82 34" stroke="#9A9A9A" stroke-width="5" stroke-linecap="round" fill="none"/>
            <!-- Feet off ground -->
            <ellipse cx="38" cy="72" rx="8" ry="5" fill="#8A8A8A"/>
            <ellipse cx="52" cy="72" rx="8" ry="5" fill="#8A8A8A"/>
            <!-- Ground shadow (gap shows jump) -->
            <ellipse cx="45" cy="84" rx="14" ry="4" fill="#D8D8D0" opacity="0.4"/>
          </svg>
